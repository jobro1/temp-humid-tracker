services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - kafka-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - kafka-net

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DATABASE:-sensor_data}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - kafka-net

  mqtt-bridge:
    image: bramglas/kafkabridge-base:latest
    container_name: mqtt-bridge
    command: ["python", "mqtt_to_kafka.py"]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kafka-net

  dashboard:
    image: bramglas/kafkabridge-base:latest
    container_name: dashboard
    command: ["python", "all_graphs.py"]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kafka-net
      - web

  pentaho:
    image: bramglas/kafkabridge-pentaho:latest
    container_name: pentaho
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file:
      - .env
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - kafka-net

volumes:
  postgres-data:

networks:
  kafka-net:
    driver: bridge
  web:
    external: true
    name: web
